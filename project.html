<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | Avanarul Trust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #B8860B;
      --primary-dark: #8B6914;
      --primary-light: #F5E6C0;
      --gold-bright: #D4A017;
      --gold-shimmer: #C9A84C;
      --cream: #FAF6EF;
      --cream-2: #F4EDD9;
      --cream-3: #EDE3CC;
      --text: #2C1D0E;
      --text-light: #5C4A2A;
      --text-muted: #9A8160;
      --border: rgba(184,134,11,0.16);
      --border-warm: rgba(184,134,11,0.26);
      --white: #FFFDF8;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(184,134,11,0.09);
      --shadow-lg: 0 8px 40px rgba(184,134,11,0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    body {
      background-color: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background: rgba(250, 246, 239, 0.97);
      backdrop-filter: blur(20px);
      border-bottom: 2px solid var(--border-warm);
      padding: 0 40px;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 24px rgba(184,134,11,0.10);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--primary);
    }

    .logo-img {
      height: 50px;
      width: 50px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid var(--gold-shimmer);
      box-shadow: 0 2px 10px rgba(184,134,11,0.22);
    }

    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .btn-outline {
      border: 1.5px solid var(--border-warm);
      color: var(--text-muted);
      padding: 8px 18px;
      text-decoration: none;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 500;
      background: transparent;
      transition: all 0.25s;
    }

    .btn-outline:hover {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--gold-shimmer);
    }

    /* ===== LOADING ===== */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 20px;
      color: var(--text-muted);
    }

    .loading-state i {
      color: var(--gold-shimmer);
      margin-bottom: 16px;
    }

    /* ===== ERROR STATE ===== */
    .error-state {
      text-align: center;
      padding: 100px 20px;
      color: var(--text-muted);
    }

    .error-state i {
      font-size: 3rem;
      color: var(--gold-shimmer);
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .error-state h2 {
      font-family: 'Playfair Display', serif;
      color: var(--primary-dark);
      margin-bottom: 12px;
    }

    .error-state a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--gold-bright), var(--primary-dark));
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .error-state a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(184,134,11,0.3);
    }

    /* ===== PROJECT HERO ===== */
    .project-hero {
      position: relative;
      width: 100%;
      height: 420px;
      overflow: hidden;
    }

    .project-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .project-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(44, 29, 14, 0.85) 0%, rgba(44, 29, 14, 0.2) 50%, transparent 100%);
    }

    .project-hero-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 60px;
      color: white;
    }

    .project-hero-date {
      font-size: 0.85rem;
      color: var(--gold-bright);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .project-hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    /* ===== PROJECT BODY ===== */
    .project-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 30px 80px;
    }

    .project-meta-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 20px 0 30px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .meta-item i {
      color: var(--gold-bright);
      font-size: 0.9rem;
    }

    .project-description {
      font-size: 1.08rem;
      line-height: 1.9;
      color: var(--text-light);
      white-space: pre-line;
    }

    .project-description p {
      margin-bottom: 20px;
    }

    /* ===== PHOTO GALLERY ===== */
    .gallery-section {
      margin-top: 50px;
    }

    .gallery-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--primary-dark);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .gallery-title i {
      color: var(--gold-bright);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .gallery-item {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      aspect-ratio: 4/3;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }

    .gallery-item:hover img {
      transform: scale(1.06);
    }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: rgba(44,29,14,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .gallery-item:hover .gallery-item-overlay {
      background: rgba(44,29,14,0.25);
    }

    .gallery-item-overlay i {
      color: white;
      font-size: 1.5rem;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.3s;
    }

    .gallery-item:hover .gallery-item-overlay i {
      opacity: 1;
      transform: scale(1);
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 10px 60px rgba(0,0,0,0.5);
      animation: lightboxIn 0.3s ease;
    }

    @keyframes lightboxIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 30px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .lightbox-close:hover { opacity: 1; }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      transition: all 0.2s;
    }

    .lightbox-nav:hover {
      opacity: 1;
      background: rgba(255,255,255,0.2);
    }

    .lightbox-prev { left: 24px; }
    .lightbox-next { right: 24px; }

    .lightbox-counter {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 1px;
    }

    /* ===== BACK LINK ===== */
    .back-section {
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      padding: 12px 28px;
      border: 1.5px solid var(--border-warm);
      border-radius: 50px;
      transition: all 0.25s;
    }

    .back-link:hover {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--gold-shimmer);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .navbar { padding: 0 20px; }
      .logo-name { display: none; }
      .project-hero { height: 280px; }
      .project-hero-content { padding: 24px 20px; }
      .project-hero-title { font-size: 1.8rem; }
      .project-body { padding: 30px 16px 60px; }
      .project-description { font-size: 1rem; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <img src="/logo.jpeg" alt="Avanarul Trust" class="logo-img">
      <span class="logo-name">Avanarul Trust</span>
    </a>
    <a href="index.html#journey" class="btn-outline"><i class="fas fa-arrow-left" style="margin-right:6px;"></i>Back to Journey</a>
  </nav>

  <!-- Loading State -->
  <div id="loading-state" class="loading-state">
    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
    <p style="margin-top: 14px;">Loading project details...</p>
  </div>

  <!-- Error State (hidden by default) -->
  <div id="error-state" class="error-state" style="display: none;">
    <i class="fas fa-exclamation-circle"></i>
    <h2>Project Not Found</h2>
    <p>The project you're looking for doesn't exist or has been removed.</p>
    <a href="index.html#journey"><i class="fas fa-arrow-left" style="margin-right: 8px;"></i>Back to Our Journey</a>
  </div>

  <!-- Project Content (hidden until loaded) -->
  <div id="project-content" style="display: none;">
    <!-- Hero Banner -->
    <div class="project-hero">
      <img id="hero-image" src="" alt="">
      <div class="project-hero-overlay"></div>
      <div class="project-hero-content">
        <div class="project-hero-date" id="project-date">
          <i class="fas fa-calendar-alt"></i>
          <span></span>
        </div>
        <h1 class="project-hero-title" id="project-title"></h1>
      </div>
    </div>

    <!-- Body -->
    <div class="project-body">
      <div class="project-meta-bar">
        <div class="meta-item">
          <i class="fas fa-calendar-alt"></i>
          <span id="meta-date"></span>
        </div>
        <div class="meta-item">
          <i class="fas fa-images"></i>
          <span id="meta-photos"></span>
        </div>
        <div class="meta-item">
          <i class="fas fa-building"></i>
          <span>Avanarul Trust</span>
        </div>
      </div>

      <div class="project-description" id="project-description"></div>

      <!-- Photo Gallery -->
      <div class="gallery-section" id="gallery-section">
        <h2 class="gallery-title"><i class="fas fa-camera-retro"></i> Project Gallery</h2>
        <div class="gallery-grid" id="gallery-grid"></div>
      </div>

      <!-- Back -->
      <div class="back-section">
        <a href="index.html#journey" class="back-link">
          <i class="fas fa-arrow-left"></i> Back to Our Journey
        </a>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close"><i class="fas fa-times"></i></button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev"><i class="fas fa-chevron-left"></i></button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightbox-next"><i class="fas fa-chevron-right"></i></button>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <script type="module" src="/project.js"></script>
</body>
</html>
