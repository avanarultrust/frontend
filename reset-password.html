<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Avanarul Trust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1582510003544-4d00b7f74220?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
    }
    .reset-container {
      background: var(--glass-bg, rgba(255, 255, 255, 0.1));
      backdrop-filter: blur(10px);
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid var(--glass-border, rgba(255, 255, 255, 0.2));
    }
    .reset-title {
      font-family: var(--font-primary, 'Playfair Display');
      color: var(--primary, #D4AF37);
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }
    .reset-subtitle {
      font-family: var(--font-secondary, 'Inter');
      color: var(--text-light, #e0e0e0);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .auth-message {
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      display: none;
    }
    .auth-message.error {
      background-color: rgba(255, 77, 77, 0.1);
      color: #ff4d4d;
      border: 1px solid rgba(255, 77, 77, 0.3);
    }
    .auth-message.success {
      background-color: rgba(76, 175, 80, 0.1);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }
  </style>
</head>
<body>

  <div class="reset-container">
    <a href="/"><img src="/logo.jpeg" alt="Avanarul Trust" style="width: 80px; height: 80px; margin-bottom: 1rem; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);"></a>
    <h2 class="reset-title">Set New Password</h2>
    <p class="reset-subtitle">Please enter your new password below.</p>
    
    <div class="auth-message" id="reset-message"></div>
    
    <form id="form-reset-password">
      <div class="input-group">
        <input type="password" id="new-password" placeholder=" " minlength="6" required>
        <label for="new-password">New Password</label>
      </div>
      <div class="input-group">
        <input type="password" id="confirm-password" placeholder=" " minlength="6" required>
        <label for="confirm-password">Confirm Password</label>
      </div>
      <button type="submit" class="btn-submit" style="width: 100%;">Update Password</button>
    </form>
    
    <div class="back-to-login" style="margin-top: 1.5rem; display: none;" id="back-home-container">
      <a href="/" style="color: var(--primary); font-family: var(--font-primary); font-weight: 600; text-decoration: none; font-size: 1.1rem;">Return to Login</a>
    </div>
  </div>

  <script>
    const API_URL = "https://backend-b1pt.onrender.com";

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const messageEl = document.getElementById('reset-message');
      const form = document.getElementById('form-reset-password');
      const backHome = document.getElementById('back-home-container');

      if (!token) {
        showMessage('Invalid or missing token. Please request a new password reset.', 'error');
        form.style.display = 'none';
        backHome.style.display = 'block';
        return;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pwd = document.getElementById('new-password').value;
        const confirmPwd = document.getElementById('confirm-password').value;

        if (pwd !== confirmPwd) {
          showMessage('Passwords do not match.', 'error');
          return;
        }

        try {
          const res = await fetch(`${API_URL}/api/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password: pwd })
          });
          const data = await res.json();

          if (!res.ok) {
            showMessage(data.message || 'Error updating password.', 'error');
          } else {
            showMessage('Password updated successfully! You can now log in.', 'success');
            form.style.display = 'none';
            backHome.style.display = 'block';
          }
        } catch (err) {
          showMessage('Server error. Try again later.', 'error');
        }
      });

      function showMessage(msg, type) {
        messageEl.textContent = msg;
        messageEl.className = `auth-message ${type}`;
        messageEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
